start_gcode = ; Sovol SV05 Sprite Pro start G-code\nM140 S[first_layer_bed_temperature] ; start bed heating\nM104 S150 ; preheat hotend (no ooze)\nG28 ; home all axes\nM420 S1 ; restore saved bed mesh\nM109 S[first_layer_temperature] ; wait for hotend temp\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nG1 Z5 F3000 ; lift nozzle\nG1 X5 Y5 F3000 ; move to front-left\nG1 Z0.3 F300 ; drop to purge height\nG92 E0 ; reset extruder\nG1 X60 E9 F500 ; purge line\nG1 X100 E3 F500 ; wipe\nG92 E0 ; reset extruder\nG1 Z2 F3000 ; lift before print
