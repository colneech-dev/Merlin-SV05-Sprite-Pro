# PrusaSlicer printer profile
# Sovol SV05 + Creality Sprite Pro direct drive
# Marlin 2.1.2.7 custom firmware

[printer:Sovol SV05 Sprite Pro]
bed_shape = 0x0,220x0,220x220,0x220
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\n
between_objects_gcode =
cooling_tube_length = 5
cooling_tube_retraction = 91.5
default_filament_profile =
default_print_profile =
deretract_speed = 0
extruder_colour = #FFFF00
extruder_offset = 0x0
gcode_flavor = marlin2
high_current_on_filament_swap = 0
host_type = octoprint
inherits =
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]\n
machine_max_acceleration_e = 5000,5000
machine_max_acceleration_extruding = 500,500
machine_max_acceleration_retracting = 500,500
machine_max_acceleration_travel = 500,500
machine_max_acceleration_x = 700,700
machine_max_acceleration_y = 700,700
machine_max_acceleration_z = 100,100
machine_max_feedrate_e = 60,60
machine_max_feedrate_x = 500,500
machine_max_feedrate_y = 500,500
machine_max_feedrate_z = 5,5
machine_max_jerk_e = 2.5,2.5
machine_max_jerk_x = 8,8
machine_max_jerk_y = 8,8
machine_max_jerk_z = 0.4,0.4
machine_min_extruding_rate = 0,0
machine_min_travel_rate = 0,0
max_layer_height = 0.35
max_print_height = 300
min_layer_height = 0.05
nozzle_diameter = 0.4
parking_pos_retraction = 92
print_host =
printer_model = SV05
printer_notes = Sovol SV05 with Creality Sprite Pro direct drive extruder\nCR Touch probe on slim mount\nMarlin 2.1.2.7 custom firmware\n\nProbe offsets: X=-37.5 Y=+6.2 Z=-3.825\nHomes X/Y to MAX (rear-right), Z to MIN
printer_settings_id =
printer_technology = FFF
printer_variant = 0.4
printer_vendor =
remaining_times = 1
retract_before_travel = 2
retract_before_wipe = 0%
retract_layer_change = 1
retract_length = 0.8
retract_length_toolchange = 4
retract_lift = 0.2
retract_lift_above = 0
retract_lift_below = 0
retract_restart_extra = 0
retract_restart_extra_toolchange = 0
retract_speed = 45
silent_mode = 0
single_extruder_multi_material = 0
thumbnails = 16x16,300x300
thumbnails_format = PNG
toolchange_gcode =
use_firmware_retraction = 0
use_relative_e_distances = 0
use_volumetric_e = 0
variable_layer_height = 1
wipe = 1
wipe_tower_no_sparse_layers = 0
z_offset = 0

start_gcode = ; Sovol SV05 Sprite Pro start G-code\nM104 S0 ; cancel any preheat\nM140 S0\nG28 ; home all axes\nM420 S1 ; restore saved bed mesh\nM109 S[first_layer_temperature] ; wait for hotend temp\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nG1 Z5 F3000 ; lift nozzle\nG1 X5 Y5 F3000 ; move to front-left\nG1 Z0.3 F300 ; drop to purge height\nG92 E0 ; reset extruder\nG1 X60 E9 F500 ; purge line\nG1 X100 E3 F500 ; wipe\nG92 E0 ; reset extruder\nG1 Z2 F3000 ; lift before print

end_gcode = ; End G-code\nG91 ; relative moves\nG1 E-2 F2700 ; retract\nG1 Z10 F3000 ; lift Z\nG90 ; absolute moves\nG1 X10 Y200 F3000 ; park nozzle\nM104 S0 ; hotend off\nM140 S0 ; bed off\nM107 ; fan off\nM84 ; motors off
